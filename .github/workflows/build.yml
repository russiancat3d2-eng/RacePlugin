name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Find and build with Maven
        run: |
          POM=$(find . -name "pom.xml" | head -1)
          DIR=$(dirname "$POM")
          echo "Found pom.xml in: $DIR"
          cd "$DIR"
          mvn clean package -q

      - name: Find and upload JAR
        run: |
          JAR=$(find . -name "*.jar" -path "*/target/*" | head -1)
          echo "Found JAR: $JAR"
          cp "$JAR" TeamDragonRace.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamDragonRace
          path: TeamDragonRace.jar
