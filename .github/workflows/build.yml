name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show all files
        run: find . -type f | sort

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          find . -name "pom.xml"
          POM=$(find . -name "pom.xml" | head -1)
          DIR=$(dirname "$POM")
          echo "Building in: $DIR"
          cd "$DIR"
          pwd
          ls -la
          mvn clean package -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamDragonRace
          path: "**/*.jar"
